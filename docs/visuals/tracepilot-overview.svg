<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF3F7"/>
    </linearGradient>
    <linearGradient id="hero" x1="120" y1="70" x2="1160" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8F1"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#F7FAFC" stop-opacity="0.98"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>

  <rect x="64" y="52" width="1152" height="184" rx="28" fill="url(#hero)" stroke="#D9E2EA" filter="url(#shadow)"/>
  <circle cx="1125" cy="96" r="86" fill="#D6612A" fill-opacity="0.08"/>
  <text x="110" y="100" fill="#D6612A" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2.5">WP ACTIVITY LOGGER PRO</text>
  <text x="110" y="150" fill="#1B2430" font-family="Arial, sans-serif" font-size="42" font-weight="700">Activity Logging, Diagnostics,</text>
  <text x="110" y="198" fill="#1B2430" font-family="Arial, sans-serif" font-size="42" font-weight="700">Threat Review, and Exports</text>
  <text x="110" y="236" fill="#5F7082" font-family="Arial, sans-serif" font-size="22">A modern WordPress admin toolkit for audit trails, issue investigation,</text>
  <text x="110" y="266" fill="#5F7082" font-family="Arial, sans-serif" font-size="22">safe mode testing, and security visibility.</text>

  <rect x="64" y="276" width="264" height="150" rx="24" fill="url(#card)" stroke="#D9E2EA" filter="url(#shadow)"/>
  <text x="94" y="320" fill="#5F7082" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">LOG STREAM</text>
  <text x="94" y="366" fill="#1B2430" font-family="Arial, sans-serif" font-size="40" font-weight="700">48</text>
  <text x="94" y="400" fill="#5F7082" font-family="Arial, sans-serif" font-size="18">Recent events visible with</text>
  <text x="94" y="426" fill="#5F7082" font-family="Arial, sans-serif" font-size="18">filters, details, and exports</text>

  <rect x="352" y="276" width="264" height="150" rx="24" fill="url(#card)" stroke="#D9E2EA" filter="url(#shadow)"/>
  <text x="382" y="320" fill="#5F7082" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">HEALTH SCORE</text>
  <text x="382" y="366" fill="#1B2430" font-family="Arial, sans-serif" font-size="40" font-weight="700">62</text>
  <text x="382" y="400" fill="#5F7082" font-family="Arial, sans-serif" font-size="18">System scanner and issue</text>
  <text x="382" y="426" fill="#5F7082" font-family="Arial, sans-serif" font-size="18">explanations in plain language</text>

  <rect x="640" y="276" width="264" height="150" rx="24" fill="url(#card)" stroke="#D9E2EA" filter="url(#shadow)"/>
  <text x="670" y="320" fill="#5F7082" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">THREAT REVIEW</text>
  <text x="670" y="366" fill="#1B2430" font-family="Arial, sans-serif" font-size="40" font-weight="700">4</text>
  <text x="670" y="400" fill="#5F7082" font-family="Arial, sans-serif" font-size="18">Threat rules, file integrity,</text>
  <text x="670" y="426" fill="#5F7082" font-family="Arial, sans-serif" font-size="18">and vulnerability controls</text>

  <rect x="928" y="276" width="288" height="150" rx="24" fill="url(#card)" stroke="#D9E2EA" filter="url(#shadow)"/>
  <text x="958" y="320" fill="#5F7082" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.2">COMPLIANCE</text>
  <text x="958" y="366" fill="#1B2430" font-family="Arial, sans-serif" font-size="34" font-weight="700">Privacy tools</text>
  <text x="958" y="400" fill="#5F7082" font-family="Arial, sans-serif" font-size="18">Retention, redaction, user export,</text>
  <text x="958" y="426" fill="#5F7082" font-family="Arial, sans-serif" font-size="18">and filtered reporting workflows</text>

  <rect x="64" y="466" width="560" height="190" rx="24" fill="url(#card)" stroke="#D9E2EA" filter="url(#shadow)"/>
  <text x="94" y="510" fill="#1B2430" font-family="Arial, sans-serif" font-size="28" font-weight="700">Core workflow</text>
  <rect x="94" y="544" width="120" height="44" rx="22" fill="#EDF3F8"/>
  <text x="122" y="572" fill="#173B63" font-family="Arial, sans-serif" font-size="18" font-weight="700">Capture</text>
  <rect x="230" y="544" width="120" height="44" rx="22" fill="#EDF3F8"/>
  <text x="262" y="572" fill="#173B63" font-family="Arial, sans-serif" font-size="18" font-weight="700">Inspect</text>
  <rect x="366" y="544" width="120" height="44" rx="22" fill="#EDF3F8"/>
  <text x="396" y="572" fill="#173B63" font-family="Arial, sans-serif" font-size="18" font-weight="700">Explain</text>
  <rect x="502" y="544" width="92" height="44" rx="22" fill="#EDF3F8"/>
  <text x="525" y="572" fill="#173B63" font-family="Arial, sans-serif" font-size="18" font-weight="700">Act</text>
  <text x="94" y="624" fill="#5F7082" font-family="Arial, sans-serif" font-size="20">Logs, diagnostics, safe mode, exports, and security review all stay inside</text>
  <text x="94" y="652" fill="#5F7082" font-family="Arial, sans-serif" font-size="20">the same admin workflow instead of forcing context switches.</text>

  <rect x="656" y="466" width="560" height="190" rx="24" fill="url(#card)" stroke="#D9E2EA" filter="url(#shadow)"/>
  <text x="686" y="510" fill="#1B2430" font-family="Arial, sans-serif" font-size="28" font-weight="700">Distribution-ready polish</text>
  <text x="686" y="562" fill="#5F7082" font-family="Arial, sans-serif" font-size="20">- sanitized admin save handlers</text>
  <text x="686" y="592" fill="#5F7082" font-family="Arial, sans-serif" font-size="20">- escaped template output</text>
  <text x="686" y="622" fill="#5F7082" font-family="Arial, sans-serif" font-size="20">- translatable user-facing strings</text>
  <text x="686" y="652" fill="#5F7082" font-family="Arial, sans-serif" font-size="20">- WordPress.org readme and documentation pack</text>
</svg>
